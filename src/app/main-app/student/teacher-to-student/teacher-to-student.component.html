<app-header></app-header>

<div
  class="lg:max-w-[90%] p-8 max-sm:px-2 max-sm:pt-4 max-sm:pb-6 mx-auto max-sm:mb-[3rem] min-h-[calc(100dvh-4rem)] max-sm:min-h-[calc(100dvh-3.5rem)]"
>
  <div class="text-center mb-12 max-sm:hidden">
    <h1
      class="text-4xl md:text-5xl font-extrabold text-foreground tracking-tight"
    >
      Contact a Teacher
    </h1>
    <p class="mt-4 text-lg text-slate-500 max-w-2xl mx-auto">
      We're here to help. Reach out to any of our dedicated teachers with your
      questions.
    </p>
  </div>

  <div class="grid lg:grid-cols-5 gap-12">
    <!-- Teachers List -->
    <div class="lg:col-span-2">
      <h2
        class="text-2xl max-sm:text-xl font-bold text-foreground mb-6 max-sm:mb-3"
      >
        Our Teachers
      </h2>
      <div class="space-y-4 max-h-[450px] overflow-y-auto pr-4">
        <div
          *ngFor="let teacher of teachers"
          class="card bg-white p-4 rounded-xl shadow-sm border border-border flex items-center space-x-4"
        >
          <img
            [src]="teacher.avatar"
            [alt]="teacher.name"
            class="w-16 h-16 rounded-lg object-cover"
          />
          <div>
            <h3 class="font-semibold text-foreground">{{ teacher.name }}</h3>
            <p class="text-sm text-slate-500">{{ teacher.subject }}</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Contact Form -->
    <div class="lg:col-span-3 card">
      <h2 class="text-2xl font-bold text-foreground mb-6">Send a Message</h2>
      <form
        class="space-y-6"
        (ngSubmit)="sendEmail()"
        [formGroup]="contactForm"
      >
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label
              class="block max-sm:text-sm font-medium text-slate-600 mb-2"
              for="name"
              >Your Name</label
            >
            <input
              hlmInput
              id="name"
              type="text"
              placeholder="John Doe"
              formControlName="name"
            />
          </div>
          <div>
            <label
              class="block max-sm:text-sm font-medium text-slate-600 mb-2"
              for="name"
              >Title</label
            >
            <input
              hlmInput
              id="name"
              type="text"
              placeholder="John Doe"
              formControlName="title"
            />
          </div>
          <div>
            <label
              class="block max-sm:text-sm font-medium text-slate-600 mb-2"
              for="email"
              >Your Email</label
            >
            <input
              hlmInput
              id="email"
              type="email"
              placeholder="john.doe@example.com"
              formControlName="email"
            />
          </div>
        </div>

        <div>
          <label
            class="block max-sm:text-sm font-medium text-slate-600 mb-2"
            for="teacher"
            >Select Teacher</label
          >
          <brn-select
            placeholder="Select a teacher"
            (valueChange)="selectedTeacher = $event"
          >
            <hlm-select-trigger class="w-full text-md max-sm:text-sm">
              <hlm-select-value>{{
                selectedTeacher || "Select a teacher"
              }}</hlm-select-value>
            </hlm-select-trigger>
            <hlm-select-content>
              <hlm-option
                *ngFor="let teacher of teachers"
                [value]="teacher.name"
                class="text-md max-sm:text-sm"
              >
                {{ teacher.name }}
              </hlm-option>
            </hlm-select-content>
          </brn-select>
        </div>

        <div>
          <label
            class="block max-sm:text-sm font-medium text-slate-600 mb-2"
            for="message"
            >Message</label
          >
          <textarea
            hlmInput
            id="message"
            rows="5"
            placeholder="Your message..."
            formControlName="message"
          ></textarea>
        </div>

        <div>
          <button
            hlmBtn
            class="max-sm:w-full py-5 flex items-center justify-center"
            type="submit"
            [disabled]="isLoading"
          >
            <ng-container *ngIf="!isLoading; else loadingTpl">
              Submit Message
            </ng-container>
            <ng-template #loadingTpl>
              <span class="flex items-center space-x-2">
                <svg
                  class="animate-spin h-5 w-5 text-white"
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                >
                  <circle
                    class="opacity-25"
                    cx="12"
                    cy="12"
                    r="10"
                    stroke="currentColor"
                    stroke-width="4"
                  ></circle>
                  <path
                    class="opacity-75"
                    fill="currentColor"
                    d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"
                  ></path>
                </svg>
                <span>Sending...</span>
              </span>
            </ng-template>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
