<div
  class="flex min-h-screen flex-col items-center justify-center bg-[var(--background-color)] p-2 sm:p-4 overflow-hidden ambient-glow-primary"
>
  <div class="w-full max-w-md z-10">
    <!-- Header -->
    <div class="mb-3 text-center">
      <div class="mx-auto mb-2 h-10 w-10 text-primary hover-scale transition-all duration-300">
        <!-- Logo -->
        <svg fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M24 0.7L47.2 24 24 47.2 0.7 24 24 0.7ZM21 35.7V12.2L9.2 24 21 35.7Z"
            fill="currentColor"
          />
        </svg>
      </div>
      <h1 class="text-2xl sm:text-3xl font-extrabold text-foreground tracking-tight">Quiz Application</h1>
      <p class="mt-1 text-muted-foreground text-xs sm:text-sm">Sign in to continue to your dashboard</p>
    </div>

    <!-- Card -->
    <div class="rounded-2xl glass-card px-5 py-4 shadow-strong border border-white/60">
      <form class="space-y-2" [formGroup]="form" (ngSubmit)="onSubmit()">
        <!-- Username -->
        <div>
          <label
            for="username"
            class="block text-xs sm:text-sm font-semibold mb-1"
            [ngClass]="errors.username ? 'text-destructive' : 'text-primary'"
          >
            Username
          </label>

          <div>
            <input
              hlmInput
              [error]="errors.username ? true : 'auto'"
              id="username"
              autofocus
              type="text"
              formControlName="username"
              placeholder="super@admin"
              #usernameInput
              (keydown.enter)="focusNext(passwordInput)"
              class="h-10 text-sm bg-white/80 focus:bg-white transition-all shadow-soft rounded-xl w-full"
            />
          </div>
          <!-- Fixed height wrapper to prevent layout shift -->
          <div class="min-h-[16px] mt-0.5">
            <p *ngIf="errors.username" class="text-destructive text-xs font-medium">
              {{ errors.username }}
            </p>
          </div>
        </div>

        <!-- Password -->
        <div>
          <label
            for="password"
            class="block text-xs sm:text-sm font-semibold mb-1"
            [ngClass]="errors.password ? 'text-destructive' : 'text-primary'"
          >
            Password
          </label>
          <div class="relative">
            <input
              hlmInput
              [error]="errors.password ? true : 'auto'"
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="super#admin"
              (input)="onPasswordInput()"
              #passwordInput
              class="h-10 text-sm bg-white/80 focus:bg-white transition-all shadow-soft rounded-xl w-full pr-10"
            />

            <!-- Eye Icon -->
            <button
              *ngIf="passwordHasValue"
              type="button"
              (click)="togglePassword()"
              [disabled]="!passwordHasValue"
              [ngClass]="errors.password ? 'text-destructive' : 'text-primary'"
              class="absolute top-1/2 -translate-y-1/2 right-2 flex items-center justify-center focus:outline-none h-8 w-8 cursor-pointer hover-scale"
            >
              <svg
                *ngIf="!showPassword"
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-eye-off"
              >
                <path
                  d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"
                />
                <path d="M14.084 14.158a3 3 0 0 1-4.242-4.242" />
                <path
                  d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"
                />
                <path d="m2 2 20 20" />
              </svg>
              <svg
                *ngIf="showPassword"
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-eye"
              >
                <path
                  d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"
                />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
          <!-- Fixed height wrapper to prevent layout shift -->
          <div class="min-h-[16px] mt-0.5">
            <p *ngIf="errors.password" class="text-destructive text-xs font-medium">
              {{ errors.password }}
            </p>
          </div>
        </div>

        <!-- Submit -->
        <div class="pt-1">
          <button
            type="submit"
            class="bg-primary text-white rounded-xl px-4 py-2 hover:bg-primary-hover focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50 transition-all duration-300 flex w-full justify-center items-center h-10 text-sm font-bold shadow-primary hover-scale button-click"
          >
            Login
          </button>
        </div>
      </form>

      <!-- Demo Credentials Helper -->
      <div class="mt-4 pt-3 border-t border-gray-100">
        <div class="rounded-2xl glass-panel p-3 border border-slate-200/60 shadow-soft">
          <div class="flex items-center mb-2 text-slate-700">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="text-primary mr-1.5"
            >
              <path d="M12 16v-4" />
              <path d="M12 8h.01" />
              <circle cx="12" cy="12" r="10" />
            </svg>
            <h3 class="font-bold text-xs sm:text-sm">Demo Test Credentials</h3>
          </div>

          <div class="space-y-2">
            <!-- Admin Credentials -->
            <div class="flex flex-col sm:flex-row sm:items-center justify-between p-2.5 bg-white/90 rounded-xl border border-slate-200/80 shadow-sm gap-2 card-hover">
              <div>
                <p class="text-xs font-bold text-slate-700">Admin</p>
                <p class="text-[11px] text-slate-500">User: <code class="bg-slate-100 px-1.5 py-0.5 rounded font-mono text-primary font-bold">super&#64;admin</code> | Pass: <code class="bg-slate-100 px-1.5 py-0.5 rounded font-mono text-primary font-bold">super#admin</code></p>
              </div>
              <button
                type="button"
                (click)="fillDemoCredentials('admin')"
                class="text-xs bg-primary/10 hover:bg-primary/20 text-primary font-bold py-1.5 px-3 rounded-xl transition-all border border-primary/20 flex items-center justify-center gap-1 cursor-pointer hover-scale button-click"
              >
                ⚡ Fill Admin
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <p class="mt-4 text-center text-xs font-medium text-[var(--text-secondary)]">
      © 2025 Quiz App. All rights reserved.
    </p>
  </div>
</div>
