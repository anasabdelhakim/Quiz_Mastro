<div
  class="flex min-h-screen flex-col items-center justify-center bg-[var(--background-color)] p-4 overflow-hidden"
>
  <div class="w-full max-w-md">
    <!-- Header -->
    <div class="mb-8 text-center">
      <div class="mx-auto mb-4 h-12 w-12 text-primary">
        <!-- Logo -->
        <svg fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M24 0.7L47.2 24 24 47.2 0.7 24 24 0.7ZM21 35.7V12.2L9.2 24 21 35.7Z"
            fill="currentColor"
          />
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-foreground">Quiz Application</h1>
      <p class="mt-2 text-muted-foreground">Sign in to continue</p>
    </div>

    <!-- Card -->
    <div class="rounded-2xl bg-white px-8 pt-8 pb-6 shadow-lg">
      <form class="space-y-5" [formGroup]="form">
        <!-- Username -->
        <div>
          <label
            for="username"
            class="block text-sm font-medium"
            [ngClass]="errors.username ? 'text-destructive' : 'text-primary'"
          >
            Username
          </label>

          <div class="mt-1">
            <input
              hlmInput
              [error]="errors.username ? true : 'auto'"
              id="username"
              autofocus
              type="text"
              formControlName="username"
              placeholder="student@username"
              #usernameInput
              (keydown.enter)="focusNext(passwordInput)"
              class="lg:h-12 lg:text-lg"
            />
          </div>
          <p *ngIf="errors.username" class="text-destructive/70 text-sm mt-1">
            {{ errors.username }}
          </p>
        </div>

        <!-- Password -->
        <!-- Password -->
        <div>
          <label
            for="password"
            class="block text-sm font-medium"
            [ngClass]="errors.password ? 'text-destructive' : 'text-primary'"
          >
            Password
          </label>
          <div class="mt-1 relative">
            <div></div>
            <input
              hlmInput
              [error]="errors.password ? true : 'auto'"
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="teacher#password"
              (input)="onPasswordInput()"
              #passwordInput
              (keydown.enter)="onSubmit()"
              class="lg:h-12 lg:text-lg"
            />

            <!-- Eye Icon -->
            <button
              *ngIf="passwordHasValue"
              type="button"
              (click)="togglePassword()"
              [disabled]="!passwordHasValue"
              [ngClass]="errors.password ? 'text-destructive' : 'text-primary'"
              class="absolute top-1/2 -translate-y-1/2 right-2 flex items-center focus:outline-none h-full cursor-pointer"
            >
              <svg
                *ngIf="!showPassword"
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-eye-off-icon lucide-eye-off"
              >
                <path
                  d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"
                />
                <path d="M14.084 14.158a3 3 0 0 1-4.242-4.242" />
                <path
                  d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"
                />
                <path d="m2 2 20 20" />
              </svg>
              <svg
                *ngIf="showPassword"
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-eye-icon lucide-eye"
              >
                <path
                  d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"
                />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
          <p *ngIf="errors.password" class="text-destructive/70 text-sm mt-1">
            {{ errors.password }}
          </p>
        </div>

        <!-- Submit -->
        <div>
          <button
            type="submit"
            class="bg-primary text-white rounded-md px-4 py-2 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50 transition-all duration-300 flex w-full justify-center h-12 text-base font-semibold"
          >
            Login
          </button>
        </div>
      </form>

      <!-- Demo Credentials Helper -->
      <div class="mt-8 pt-6 border-t border-gray-100">
        <div class="rounded-xl bg-slate-50 p-4 border border-slate-200/60">
          <div class="flex items-center mb-3 text-slate-700">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="text-primary mr-2"
            >
              <path d="M12 16v-4" />
              <path d="M12 8h.01" />
              <circle cx="12" cy="12" r="10" />
            </svg>
            <h3 class="font-semibold text-sm">Demo Test Credentials</h3>
          </div>

          <div class="space-y-3">
            <!-- Admin Credentials -->
            <div class="flex flex-col sm:flex-row sm:items-center justify-between p-3 bg-white rounded-lg border border-slate-200 shadow-sm gap-2">
              <div>
                <p class="text-xs font-bold text-slate-700">Admin / Teacher</p>
                <p class="text-xs text-slate-500">User: <code class="bg-slate-100 px-1 py-0.5 rounded font-mono text-primary font-semibold">teacher&#64;demo</code> | Pass: <code class="bg-slate-100 px-1 py-0.5 rounded font-mono text-primary font-semibold">teacher#demo</code></p>
              </div>
              <button
                type="button"
                (click)="fillDemoCredentials('admin')"
                class="text-xs bg-primary/10 hover:bg-primary/20 text-primary font-semibold py-1.5 px-3 rounded-md transition-colors border border-primary/20 flex items-center justify-center gap-1 cursor-pointer"
              >
                ⚡ Fill Admin
              </button>
            </div>

            <!-- Student Credentials -->
            <div class="flex flex-col sm:flex-row sm:items-center justify-between p-3 bg-white rounded-lg border border-slate-200 shadow-sm gap-2">
              <div>
                <p class="text-xs font-bold text-slate-700">Student Portal</p>
                <p class="text-xs text-slate-500">User: <code class="bg-slate-100 px-1 py-0.5 rounded font-mono text-primary font-semibold">student&#64;demo</code> | Pass: <code class="bg-slate-100 px-1 py-0.5 rounded font-mono text-primary font-semibold">student#demo</code></p>
              </div>
              <button
                type="button"
                (click)="fillDemoCredentials('student')"
                class="text-xs bg-primary/10 hover:bg-primary/20 text-primary font-semibold py-1.5 px-3 rounded-md transition-colors border border-primary/20 flex items-center justify-center gap-1 cursor-pointer"
              >
                ⚡ Fill Student
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <p class="mt-6 text-center text-sm text-[var(--text-secondary)]">
      © 2025 Quiz App. All rights reserved.
    </p>
  </div>
</div>
